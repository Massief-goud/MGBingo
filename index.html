<style>
/* ... bestaande styles ... */

.bingo-board {
    position: relative;
    width: min(90vw, 600px);
    max-width: 600px;
    aspect-ratio: 1 / 1;
    margin: 20px auto;
    background: url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
    background-size: contain;           /* expliciet toevoegen */
    background-position: center;
    border-radius: 8px;
    overflow: hidden;                   /* voorkomt overflow issues */
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

/* Extra iOS/Safari veilige fallback */
@supports not (aspect-ratio: 1 / 1) {
    .bingo-board {
        padding-top: 100%;              /* 1:1 aspect ratio fallback */
    }
}

.grid {
    position: absolute;
    top: 10.5%;
    left: 10.5%;
    width: 79%;
    height: 79%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    padding: 2px;                       /* kleine buffer voor betere klikbaarheid */
    box-sizing: border-box;
}

/* Mini boards in overzicht ook verbeteren */
.mini-board {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
    background-size: contain;
    max-width: 220px;
    margin: 0 auto;
}

/* Body aanpassing voor betere mobiele weergave */
body {
    padding: 15px;
    min-height: 100vh;
    background-attachment: scroll; /* fixed kan problemen geven op iOS */
}
</style>
