<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Massief Goud - Jungle Bingo - Hawx.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;color:white;margin:0;padding:20px;}
.tabs{display:flex;gap:10px;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}
.bingo-board{position:relative;width:min(90vw,620px);aspect-ratio:1/1;margin:0 auto;background:url('./bingo templateV1.png') center/contain no-repeat;}
.team-overlay {position:absolute;top:3%;left:0;width:100%;text-align:center;font-size:calc(14px + 1.5vw);font-weight:bold;color:#f5d76e;text-shadow: 2px 2px 8px rgba(0,0,0,0.9);pointer-events:none;text-transform:uppercase;letter-spacing:2px;}
.grid{position:absolute;top:12%;left:11.5%;width:77%;height:77%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{content:"";position:absolute;top:50%;left:50%;width:82%;height:13px;background:rgba(0,255,80,.45);border-radius:999px;}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.public-grid-container {display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;}
.public-card {background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.preview-modal {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;padding:20px;}
.preview-modal.active {display:flex;}
.modal-content {position:relative;width:100%;max-width:650px;display:flex;flex-direction:column;gap:15px;}
.win-overlay {position:absolute;background: rgba(0, 255, 80, 0.28);box-shadow: 0 0 30px rgba(0, 255, 80, 0.75);border-radius: 8px;}
</style>
</head>
<body>

<div class="tabs">
    <button onclick="showTab('public')">Overzicht Kaarten</button>
    <button onclick="showTab('editor')">Bingo Kaart Editor</button>
    <button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<div id="public" class="panel active">
    <h2>Actueel Overzicht</h2>
    <div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<div id="editor" class="panel">
    <div class="controls">
        <input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
        <button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
        <button onclick="newCard()">Nieuwe kaart</button>
    </div>
    <div class="bingo-board">
        <div id="teamOverlay" class="team-overlay"></div>
        <div class="grid" id="grid"></div>
    </div>
</div>

<div id="saved" class="panel">
    <h2>Opgeslagen kaarten (Beheer)</h2>
    <div id="savedCards"></div>
</div>

<script>
const SUPABASE_URL = "https://fjzwtjgtmlrcwiytpyqw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqend0amd0bWxyY3dpeXRweXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTE1ODIsImV4cCI6MjA5NjE2NzU4Mn0.ne13FbGpwDq-qINjCCFBsM6EZgJeJK3LjxxEGM8Qw9M";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PASSWORD = "1337";
let editUnlocked = false;
let globalCards = [];

document.addEventListener("DOMContentLoaded", () => {
    buildEditorGrid();
    loadPublicCards();
});

function unlockEdit(){
    if(editUnlocked) return true;
    const p = prompt("Voer beheerderscode in:");
    if(p === PASSWORD){ editUnlocked = true; return true; }
    alert("Onjuiste code");
    return false;
}

function showTab(id){
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'saved') loadSavedCards();
    if(id === 'public') loadPublicCards();
}

function buildEditorGrid() {
    const grid = document.getElementById('grid');
    for(let i = 0; i < 16; i++){
        let c = document.createElement('div');
        c.className = 'cell';
        c.onclick = () => { if(unlockEdit()) c.classList.toggle('checked'); };
        grid.appendChild(c);
    }
}

async function loadSavedCards() {
    const container = document.getElementById('savedCards');
    container.innerHTML = 'Laden...';
    const { data } = await supabaseClient.from('bingo_cards').select('*').order('team');
    container.innerHTML = '';
    (data || []).forEach(card => {
        const div = document.createElement('div');
        div.style.margin = "10px 0"; div.style.padding = "10px"; div.style.background = "#333";
        div.innerHTML = `<strong>${card.team}</strong> 
            <button onclick="editCard('${card.team}')">Bewerk</button> 
            <button onclick="deleteCard('${card.team}')" style="background:red">Verwijder</button>`;
        container.appendChild(div);
    });
}

async function editCard(team) {
    if(!unlockEdit()) return;
    const card = globalCards.find(c => c.team === team);
    document.getElementById('teamName').value = card.team;
    updateTeamOverlay();
    document.querySelectorAll('#grid .cell').forEach((c, i) => c.classList.toggle('checked', card.checked.includes(i)));
    showTab('editor');
}

async function deleteCard(team) {
    if(!unlockEdit()) return;
    if(!confirm('Verwijderen?')) return;
    await supabaseClient.from('bingo_cards').delete().eq('team', team);
    loadSavedCards();
    loadPublicCards();
}

async function saveCard(){
    const team = document.getElementById('teamName').value.trim();
    const checked = Array.from(document.querySelectorAll('#grid .cell')).map((c,i) => c.classList.contains('checked') ? i : null).filter(i => i !== null);
    await supabaseClient.from('bingo_cards').upsert({ team, checked }, { onConflict: 'team' });
    alert('Opgeslagen!');
    loadPublicCards();
}

async function loadPublicCards(){
    const { data } = await supabaseClient.from('bingo_cards').select('*');
    globalCards = data || [];
    // ... weergave logica
}

function updateTeamOverlay() { document.getElementById('teamOverlay').innerText = document.getElementById('teamName').value; }
function newCard(){ document.getElementById('teamName').value = ''; document.querySelectorAll('#grid .cell').forEach(c => c.classList.remove('checked')); }
</script>
</body>
</html>
