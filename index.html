<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Massief Goud - Jungle Bingo - Hawx.</title>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px; flex-wrap:wrap}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart */
.bingo-board{
 position:relative;width:min(90vw,620px);aspect-ratio:1/1;margin:0 auto;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:3%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#f5d76e;text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:2px;
}
.grid{
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:82%;height:13px;background:rgba(0,255,80,.45);border-radius:999px;
}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* Overzichtskaarten */
.public-grid-container {
 display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;
}
.public-card {
 background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;
 display:flex;flex-direction:column;align-items:center;gap:10px;
}
.public-card h3 {
 margin:0;font-size:16px;text-transform:uppercase;color:#f5d76e;text-align:center;
 width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-board {
 position:relative;width:100%;aspect-ratio:1/1;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.mini-grid {
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.mini-cell { position:relative; }
.mini-cell.checked::before,.mini-cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:88%;height:9px;background:rgba(0,255,80,.85);border-radius:999px;
}
.mini-cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.mini-cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.public-card button { width:100%; margin-top:5px; }

/* Preview Modal */
.preview-modal {
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;
 padding:20px;
}
.preview-modal.active { display:flex; }
.modal-content {
 position:relative;width:100%;max-width:650px;
 display:flex;flex-direction:column;gap:15px;
}
.modal-close {
 position:absolute;top:-45px;right:0;font-size:32px;color:white;
 background:none;border:none;cursor:pointer;font-weight:bold;
}
.modal-close:hover { color:#ff9800; }

/* Win Highlights */
.win-overlay {
  position: absolute;
  background: rgba(0, 255, 80, 0.28);
  box-shadow: 0 0 30px rgba(0, 255, 80, 0.75);
  pointer-events: none;
  z-index: 5;
  border-radius: 8px;
}
.global-win-overlay {
  position: absolute;
  background: rgba(220, 20, 60, 0.55);
  box-shadow: 0 0 40px rgba(220, 20, 60, 0.9);
  pointer-events: none;
  z-index: 6;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="tabs">
<button onclick="showTab('public')">Overzicht Kaarten</button>
<button onclick="showTab('editor')">Bingo Kaart Editor</button>
<button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<!-- Openbaar overzicht -->
<div id="public" class="panel active">
<h2>Actueel Overzicht van alle deelnemende kaarten</h2>
<p>Klik op "Bekijken" om een kaart te bekijken.</p>
<button class="btn-screenshot" onclick="takeAllCardsScreenshot()" style="margin-bottom:15px;">
📷 Screenshot van alle kaarten
</button>
<div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<!-- Editor -->
<div id="editor" class="panel">
<div class="controls">
<input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
<button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
<button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
<button onclick="newCard()">Nieuwe kaart</button>
</div>

<div class="bingo-board">
<div id="teamOverlay" class="team-overlay"></div>
<div class="grid" id="grid"></div>
</div>
</div>

<!-- Staff paneel -->
<div id="saved" class="panel">
<h2>Opgeslagen kaarten (Beheer)</h2>
<div id="savedCards"></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <button class="modal-close" onclick="closePreview(null)">&times;</button>
   <div class="bingo-board">
     <div id="previewTeamOverlay" class="team-overlay"></div>
     <div id="previewGrid" class="grid"></div>
   </div>
 </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ==================== SUPABASE CONFIG ====================
const SUPABASE_URL = "https://fjzwtjgtmlrcwiytpyqw.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqend0amd0bWxyY3dpeXRweXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTE1ODIsImV4cCI6MjA5NjE2NzU4Mn0.ne13FbGpwDq-qINjCCFBsM6EZgJeJK3LjxxEGM8Qw9M";

let supabaseClient = null;

async function initSupabase() {
  try {
    supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log("✅ Supabase client succesvol geïnitialiseerd");
    return true;
  } catch (e) {
    console.error("❌ Supabase initialisatie mislukt:", e);
    return false;
  }
}

// ==================== BASIS FUNCTIES ====================
const PASSWORD = "1337";
let editUnlocked = false;

document.addEventListener("DOMContentLoaded", async () => {
  await initSupabase();
  loadPublicCards();
  buildEditorGrid();
  buildPreviewGrid();
});

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p === PASSWORD){ editUnlocked = true; return true; }
 alert("Onjuiste code");
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 const name = document.getElementById('teamName').value;
 document.getElementById('teamOverlay').innerText = name;
}

// Win Highlights
function getGlobalWins(cards) {
  const rowWins = new Set();
  const colWins = new Set();
  cards.forEach(data => {
    const checked = new Array(16).fill(false);
    (data.checked || []).forEach(i => checked[i] = true);
    for(let r = 0; r < 4; r++) if(checked.slice(r*4, r*4+4).every(Boolean)) rowWins.add(r);
    for(let c = 0; c < 4; c++) if([0,1,2,3].every(r => checked[r*4 + c])) colWins.add(c);
  });
  return { rowWins: Array.from(rowWins), colWins: Array.from(colWins) };
}

function createWinOverlay(container, type, index, className) {
  const overlay = document.createElement('div');
  overlay.className = className;
  if(type === 'row') {
    overlay.style.top = `${12 + (index * 19.25)}%`;
    overlay.style.left = '11.5%';
    overlay.style.width = '77%';
    overlay.style.height = '19%';
  } else {
    overlay.style.top = '12%';
    overlay.style.left = `${11.5 + (index * 19.25)}%`;
    overlay.style.width = '19%';
    overlay.style.height = '77%';
  }
  container.appendChild(overlay);
}

// Grids
function buildEditorGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for(let i = 0; i < 16; i++){
    let c = document.createElement('div');
    c.className = 'cell';
    c.onclick = () => {
      if(!unlockEdit()) return;
      c.classList.toggle('checked');
      updateWinHighlights();
    };
    grid.appendChild(c);
  }
}

function buildPreviewGrid() {
  const pGrid = document.getElementById('previewGrid');
  pGrid.innerHTML = '';
  for(let i = 0; i < 16; i++){
    let c = document.createElement('div');
    c.className = 'cell';
    pGrid.appendChild(c);
  }
}

function updateWinHighlights() {
  const checked = Array.from(document.querySelectorAll('#grid .cell')).map(c => c.classList.contains('checked'));
  const container = document.getElementById('grid');
  document.querySelectorAll('#grid .win-overlay').forEach(el => el.remove());

  for(let row = 0; row < 4; row++) {
    if(checked.slice(row*4, row*4+4).every(v => v)) createWinOverlay(container, 'row', row, 'win-overlay');
  }
  for(let col = 0; col < 4; col++) {
    if([0,1,2,3].every(r => checked[r*4 + col])) createWinOverlay(container, 'col', col, 'win-overlay');
  }
}

// ==================== SUPABASE OPSLAG ====================
async function saveCard(){
  const team = document.getElementById('teamName').value.trim();
  if(!team) return alert('Voer een teamnaam in');
  
  const checked = [];
  document.querySelectorAll('#grid .cell').forEach((c,i) => {
    if(c.classList.contains('checked')) checked.push(i);
  });

  if (!supabaseClient) {
    alert("❌ Supabase niet verbonden. Herlaad de pagina.");
    return;
  }

  try {
    const { error } = await supabaseClient
      .from('bingo_cards')
      .upsert({ team, checked, updated_at: new Date().toISOString() }, { onConflict: 'team' });
    
    if(error) throw error;
    alert('✅ Kaart succesvol opgeslagen in Supabase!');
  } catch(e) {
    console.error(e);
    alert('❌ Fout bij opslaan: ' + e.message);
  }
  
  loadSavedCards();
  loadPublicCards();
}

async function loadPublicCards(){
  const container = document.getElementById('publicCardsContainer');
  container.innerHTML = '';

  if (!supabaseClient) {
    container.innerHTML = '<p style="color:red;">Supabase niet verbonden. Herlaad de pagina.</p>';
    return;
  }

  try {
    const { data: cards, error } = await supabaseClient
      .from('bingo_cards')
      .select('*')
      .order('team');

    if(error) throw error;

    if(!cards || cards.length === 0) {
      container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Nog geen bingokaarten opgeslagen.</p>';
      return;
    }

    const global = getGlobalWins(cards);

    cards.forEach(data => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'public-card';
      
      cardDiv.innerHTML = `
        <h3>${data.team}</h3>
        <div class="mini-board"><div class="mini-grid"></div></div>
        <button class="btn-preview">Bekijken</button>
      `;

      const miniGrid = cardDiv.querySelector('.mini-grid');
      for(let i = 0; i < 16; i++) {
        const miniCell = document.createElement('div');
        miniCell.className = 'mini-cell';
        if(data.checked.includes(i)) miniCell.classList.add('checked');
        miniGrid.appendChild(miniCell);
      }

      global.rowWins.forEach(row => {
        const overlay = document.createElement('div');
        overlay.className = 'global-win-overlay';
        overlay.style.top = `${row * 25}%`;
        overlay.style.left = '0%';
        overlay.style.width = '100%';
        overlay.style.height = '25%';
        miniGrid.appendChild(overlay);
      });

      global.colWins.forEach(col => {
        const overlay = document.createElement('div');
        overlay.className = 'global-win-overlay';
        overlay.style.top = '0%';
        overlay.style.left = `${col * 25}%`;
        overlay.style.width = '25%';
        overlay.style.height = '100%';
        miniGrid.appendChild(overlay);
      });

      cardDiv.querySelector('.btn-preview').addEventListener('click', () => openPreview(data.team));
      container.appendChild(cardDiv);
    });
  } catch(e) {
    console.error(e);
    container.innerHTML = `<p style="color:red;">Fout bij laden: ${e.message}</p>`;
  }
}

async function openPreview(teamName) {
  if (!supabaseClient) return;
  try {
    const { data } = await supabaseClient.from('bingo_cards').select('*').eq('team', teamName).single();
    if(!data) return;

    document.getElementById('previewTeamOverlay').innerText = data.team;
    const previewCells = document.querySelectorAll('#previewGrid .cell');
    previewCells.forEach((cell, i) => cell.classList.toggle('checked', data.checked.includes(i)));

    const previewGrid = document.getElementById('previewGrid');
    document.querySelectorAll('#previewGrid .win-overlay, #previewGrid .global-win-overlay').forEach(el => el.remove());

    const global = getGlobalWins([data]);
    global.rowWins.forEach(r => createWinOverlay(previewGrid, 'row', r, 'global-win-overlay'));
    global.colWins.forEach(c => createWinOverlay(previewGrid, 'col', c, 'global-win-overlay'));

    document.getElementById('previewModal').classList.add('active');
  } catch(e) { console.error(e); }
}

// Overige functies
function newCard(){
  document.getElementById('teamName').value = '';
  updateTeamOverlay();
  document.querySelectorAll('#grid .cell').forEach(c => c.classList.remove('checked'));
  updateWinHighlights();
}

function loadSavedCards(){
  const container = document.getElementById('savedCards');
  container.innerHTML = '<p style="color:#aaa;">Kaarten worden opgeslagen in Supabase.</p>';
}

function editCard(team){
  alert("Gebruik de Editor om een kaart te bewerken.");
}

function deleteCard(team){
  if(!unlockEdit()) return;
  if(confirm('Kaart verwijderen?')){
    supabaseClient.from('bingo_cards').delete().eq('team', team).then(() => loadPublicCards());
  }
}

function takeAllCardsScreenshot() {
  alert("Screenshot functie is nog lokaal (kan later uitgebreid worden).");
}

function takeScreenshot() {
  alert("Screenshot huidige kaart werkt nog via canvas.");
}

function closePreview(event) {
  if(!event || event.target.id === 'previewModal') {
    document.getElementById('previewModal').classList.remove('active');
  }
}
</script>
</body>
</html>
