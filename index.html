<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Massief Goud - Jungle Bingo - Hawx.</title>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px; flex-wrap:wrap}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart */
.bingo-board{
 position:relative;width:min(90vw,620px);aspect-ratio:1/1;margin:0 auto;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:3%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#f5d76e;text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:2px;
}
.grid{
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:82%;height:13px;background:rgba(0,255,80,.45);border-radius:999px;
}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* Overzichtskaarten */
.public-grid-container {
 display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;
}
.public-card {
 background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;
 display:flex;flex-direction:column;align-items:center;gap:10px;
}
.public-card h3 {
 margin:0;font-size:16px;text-transform:uppercase;color:#f5d76e;text-align:center;
 width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-board {
 position:relative;width:100%;aspect-ratio:1/1;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.mini-grid {
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.mini-cell { position:relative; }
.mini-cell.checked::before,.mini-cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:88%;height:9px;background:rgba(0,255,80,.85);border-radius:999px;
}
.mini-cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.mini-cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.public-card button { width:100%; margin-top:5px; }

/* Preview Modal */
.preview-modal {
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;
 padding:20px;
}
.preview-modal.active { display:flex; }
.modal-content {
 position:relative;width:100%;max-width:650px;
 display:flex;flex-direction:column;gap:15px;
}
.modal-close {
 position:absolute;top:-45px;right:0;font-size:32px;color:white;
 background:none;border:none;cursor:pointer;font-weight:bold;
}
.modal-close:hover { color:#ff9800; }

/* Win Highlights */
.win-overlay {
  position: absolute;
  background: rgba(0, 255, 80, 0.28);
  box-shadow: 0 0 30px rgba(0, 255, 80, 0.75);
  pointer-events: none;
  z-index: 5;
  border-radius: 8px;
}
.global-win-overlay {
  position: absolute;
  background: rgba(220, 20, 60, 0.55);
  box-shadow: 0 0 40px rgba(220, 20, 60, 0.9);
  pointer-events: none;
  z-index: 6;
  border-radius: 8px;
}
</style>
</head>
<body>

<div class="tabs">
<button onclick="showTab('public')">Overzicht Kaarten</button>
<button onclick="showTab('editor')">Bingo Kaart Editor</button>
<button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<!-- Openbaar overzicht -->
<div id="public" class="panel active">
<h2>Actueel Overzicht van alle deelnemende kaarten</h2>
<p id="statusMessage">Verbinden met Supabase...</p>
<button class="btn-screenshot" onclick="takeAllCardsScreenshot()" style="margin-bottom:15px;">
📷 Screenshot van alle kaarten
</button>
<div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<!-- Editor -->
<div id="editor" class="panel">
<div class="controls">
<input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
<button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
<button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
<button onclick="newCard()">Nieuwe kaart</button>
</div>

<div class="bingo-board">
<div id="teamOverlay" class="team-overlay"></div>
<div class="grid" id="grid"></div>
</div>
</div>

<!-- Staff paneel -->
<div id="saved" class="panel">
<h2>Opgeslagen kaarten (Beheer)</h2>
<div id="savedCards"></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <button class="modal-close" onclick="closePreview(null)">&times;</button>
   <div class="bingo-board">
     <div id="previewTeamOverlay" class="team-overlay"></div>
     <div id="previewGrid" class="grid"></div>
   </div>
 </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
<script>
// --- SUPABASE CONFIGURATIE ---
const SUPABASE_URL = "https://fjzwtjgtmlrcwiytpyqw.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqend0amd0bWxyY3dpeXRweXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTE1ODIsImV4cCI6MjA5NjE2NzU4Mn0.ne13FbGpwDq-qINjCCFBsM6EZgJeJK3LjxxEGM8Qw9M";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PASSWORD = "1337";
let editUnlocked = false;
let globalCardsCached = []; // Tijdelijke opslag om niet constant de DB te hoeven aanroepen bij previews

document.addEventListener("DOMContentLoaded", () => {
  loadPublicCards();
  buildEditorGrid();
  buildPreviewGrid();
});

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p === PASSWORD){ editUnlocked = true; return true; }
 alert("Onjuiste code");
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 const name = document.getElementById('teamName').value;
 document.getElementById('teamOverlay').innerText = name;
}

function buildEditorGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  c.onclick = () => {
    if(!unlockEdit()) return;
    c.classList.toggle('checked');
  };
  grid.appendChild(c);
 }
}

function buildPreviewGrid() {
 const pGrid = document.getElementById('previewGrid');
 pGrid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  pGrid.appendChild(c);
 }
}

// KAART OPSLAAN IN SUPABASE (INSERT / UPSERT)
async function saveCard(){
 const team = document.getElementById('teamName').value.trim();
 if(!team) return alert('Voer een teamnaam in');
 
 const checked = [];
 document.querySelectorAll('#grid .cell').forEach((c,i) => {
   if(c.classList.contains('checked')) checked.push(i);
 });
 
 // Upsert zorgt ervoor dat als het team al bestaat, hij wordt geüpdatet. Anders maakt hij een nieuwe aan.
 const { error } = await _supabase
   .from('bingo_cards')
   .upsert({ team: team, checked: checked }, { onConflict: 'team' });

 if (error) {
   alert('Fout bij opslaan: ' + error.message);
 } else {
   alert('Kaart succesvol opgeslagen in database!');
   newCard();
   loadPublicCards();
 }
}

function newCard(){
 document.getElementById('teamName').value = '';
 updateTeamOverlay();
 document.querySelectorAll('#grid .cell').forEach(c => c.classList.remove('checked'));
}

// INLADEN IN BEHEERDERSSCHERM
async function loadSavedCards(){
 const container = document.getElementById('savedCards');
 container.innerHTML = 'Laden...';
 
 const { data, error } = await _supabase
   .from('bingo_cards')
   .select('*')
   .order('team', { ascending: true });

 if(error) return container.innerHTML = 'Fout bij laden: ' + error.message;
 container.innerHTML = '';
 
 if(data.length === 0) {
   container.innerHTML = '<p>Geen kaarten gevonden.</p>';
   return;
 }

 globalCardsCached = data; // Cache updaten
 
 data.forEach(card => {
   const row = document.createElement('div');
   row.className = 'card-item';
   // Escapen van eventuele quotes in teamnaam voor de inline JS functions
   const safeTeam = card.team.replace(/'/g, "\\'");
   row.innerHTML = `<span>${card.team}</span>
   <span>
     <button onclick="editCard('${safeTeam}')">Bewerken</button>
     <button onclick="deleteCard('${safeTeam}')">Verwijderen</button>
   </span>`;
   container.appendChild(row);
 });
}

// INLADEN IN OPENBAAR OVERZICHT
async function loadPublicCards(){
 const container = document.getElementById('publicCardsContainer');
 container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Kaarten worden geladen...</p>';
 
 const { data, error } = await _supabase
   .from('bingo_cards')
   .select('*')
   .order('team', { ascending: true });

 if(error) return container.innerHTML = 'Fout bij laden: ' + error.message;
 container.innerHTML = '';
 
 globalCardsCached = data; // Cache updaten
 
 if(data.length === 0) {
   container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Nog geen bingokaarten opgeslagen.</p>';
   return;
 }
 
 data.forEach(card => {
   const cardDiv = document.createElement('div');
   cardDiv.className = 'public-card';
   const safeTeam = card.team.replace(/'/g, "\\'");
   
   cardDiv.innerHTML = `
     <h3>${card.team}</h3>
     <div class="mini-board">
       <div class="mini-grid"></div>
     </div>
     <button class="btn-preview" onclick="openPreview('${safeTeam}')">Bekijken</button>
   `;
   
   const miniGrid = cardDiv.querySelector('.mini-grid');
   for(let i = 0; i < 16; i++) {
     const miniCell = document.createElement('div');
     miniCell.className = 'mini-cell';
     if(card.checked && card.checked.includes(i)) miniCell.classList.add('checked');
     miniGrid.appendChild(miniCell);
   }
   container.appendChild(cardDiv);
 });
}

function openPreview(teamName) {
 const data = globalCardsCached.find(c => c.team === teamName);
 if(!data) return;
 
 document.getElementById('previewTeamOverlay').innerText = data.team;
 
 const previewCells = document.querySelectorAll('#previewGrid .cell');
 previewCells.forEach((cell, i) => {
   cell.classList.toggle('checked', data.checked.includes(i));
 });
 
 document.getElementById('previewModal').classList.add('active');
}

function closePreview(event) {
 if(!event || event.target.id === 'previewModal') {
   document.getElementById('previewModal').classList.remove('active');
 }
}

function editCard(teamName){
 if(!unlockEdit()) return;
 const data = globalCardsCached.find(c => c.team === teamName);
 if(!data) return;

 showTab('editor');
 newCard();
 document.getElementById('teamName').value = data.team;
 updateTeamOverlay();
 data.checked.forEach(i => {
   if(document.querySelectorAll('#grid .cell')[i]) {
     document.querySelectorAll('#grid .cell')[i].classList.add('checked');
   }
 });
}

// VERWIJDEREN UIT SUPABASE
async function deleteCard(teamName){
 if(!unlockEdit()) return;
 if(confirm(`Kaart voor team '${teamName}' verwijderen?`)){
   const { error } = await _supabase
     .from('bingo_cards')
     .delete()
     .eq('team', teamName);

   if(error) {
     alert('Fout bij verwijderen: ' + error.message);
   } else {
     loadSavedCards();
     loadPublicCards();
   }
 }
}
// Andere functies (newCard, openPreview, etc.) kunnen later uitgebreid worden.

function newCard(){
  document.getElementById('teamName').value = '';
  updateTeamOverlay();
  document.querySelectorAll('#grid .cell').forEach(c => c.classList.remove('checked'));
  updateWinHighlights();
}

function closePreview(event) {
  if(!event || event.target.id === 'previewModal') {
    document.getElementById('previewModal').classList.remove('active');
  }
}
</script>
</body>
</html>
