<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Massief Goud - Jungle Bingo - Hawx.</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart - NIEUWE TEMPLATE */
.bingo-board{
 position:relative;width:min(90vw,620px);aspect-ratio:1/1;margin:0 auto;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:3%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#f5d76e;text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:2px;
}
.grid{
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:82%;height:13px;background:rgba(0,255,80,.45);border-radius:999px;
}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* Overzichtskaarten */
.public-grid-container {
 display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;
}
.public-card {
 background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;
 display:flex;flex-direction:column;align-items:center;gap:10px;
}
.public-card h3 {
 margin:0;font-size:16px;text-transform:uppercase;color:#f5d76e;text-align:center;
 width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-board {
 position:relative;width:100%;aspect-ratio:1/1;
 background:url('./bingo templateV1.png') center/contain no-repeat;
}
.mini-grid {
 position:absolute;top:12%;left:11.5%;width:77%;height:77%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.mini-cell { position:relative; }
.mini-cell.checked::before,.mini-cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:82%;height:4px;background:rgba(0,255,80,.7);border-radius:999px;
}
.mini-cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.mini-cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.public-card button { width:100%; margin-top:5px; }

/* Preview Modal */
.preview-modal {
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;
 padding:20px;
}
.preview-modal.active { display:flex; }
.modal-content {
 position:relative;width:100%;max-width:650px;
 display:flex;flex-direction:column;gap:15px;
}
.modal-close {
 position:absolute;top:-45px;right:0;font-size:32px;color:white;
 background:none;border:none;cursor:pointer;font-weight:bold;
}
.modal-close:hover { color:#ff9800; }

/* Win Highlights */
.win-overlay {
  position: absolute;
  background: rgba(0, 255, 80, 0.28);
  box-shadow: 0 0 30px rgba(0, 255, 80, 0.75);
  pointer-events: none;
  z-index: 5;
  border-radius: 8px;
}
.global-win-overlay {
  position: absolute;
  background: rgba(349, 99, 49, 0.4);
  box-shadow: 0 0 4px rgba(349, 99, 49, 0.6);
  pointer-events: none;
  z-index: 3;
  border-radius: 8px;
}

/* Card Item in Staff Panel */
.card-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  background: rgba(51, 51, 51, 0.8);
  border: 1px solid #555;
  border-radius: 8px;
  margin-bottom: 8px;
  color: #fff;
}
.card-item span:first-child {
  font-weight: bold;
  flex: 1;
}
.card-item span:last-child {
  display: flex;
  gap: 8px;
}
</style>
</head>
<body>

<div class="tabs">
<button onclick="showTab('public')">Overzicht Kaarten</button>
<button onclick="showTab('editor')">Bingo Kaart Editor</button>
<button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<!-- Openbaar overzicht -->
<div id="public" class="panel active">
<h2>Actueel Overzicht van alle deelnemende kaarten</h2>
<p>Klik op "Bekijken" om een kaart te bekijken.</p>
<button class="btn-screenshot" onclick="takeAllCardsScreenshot()" style="margin-bottom:15px;">
📷 Screenshot van alle kaarten
</button>
<div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<!-- Editor -->
<div id="editor" class="panel">
<div class="controls">
<input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
<button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
<button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
<button onclick="newCard()">Nieuwe kaart</button>
</div>

<div class="bingo-board">
<div id="teamOverlay" class="team-overlay"></div>
<div class="grid" id="grid"></div>
</div>
</div>

<!-- Staff paneel -->
<div id="saved" class="panel">
<h2>Opgeslagen kaarten (Beheer)</h2>
<div id="savedCards"></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <button class="modal-close" onclick="closePreview(null)">&times;</button>
   <div class="bingo-board">
     <div id="previewTeamOverlay" class="team-overlay"></div>
     <div id="previewGrid" class="grid"></div>
   </div>
 </div>
</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<script>
// --- SUPABASE CONFIGURATIE ---
const SUPABASE_URL = "https://fjzwtjgtmlrcwiytpyqw.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqend0amd0bWxyY3dpeXRweXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTE1ODIsImV4cCI6MjA5NjE2NzU4Mn0.ne13FbGpwDq-qINjCCFBsM6EZgJeJK3LjxxEGM8Qw9M";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let editUnlocked = false;
let globalCardsCached = []; // Tijdelijke opslag om niet constant de DB te hoeven aanroepen bij previews

// Config versleuteling (gemaskeerd in code)
const _config = {
 s: [49, 51, 51, 55],
 v: (i) => String.fromCharCode(...i)
};

function _verify(input) {
 return input === _config.v(_config.s);
}

document.addEventListener("DOMContentLoaded", () => {
  loadPublicCards();
  buildEditorGrid();
  buildPreviewGrid();
});

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p && _verify(p)){ editUnlocked = true; return true; }
 alert("Onjuiste code");
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 const name = document.getElementById('teamName').value;
 document.getElementById('teamOverlay').innerText = name;
}

function buildEditorGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  c.onclick = () => {
    if(!unlockEdit()) return;
    c.classList.toggle('checked');
    updateWinHighlights();
  };
  grid.appendChild(c);
 }
}

function buildPreviewGrid() {
 const pGrid = document.getElementById('previewGrid');
 pGrid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  pGrid.appendChild(c);
 }
}

// KAART OPSLAAN IN SUPABASE (INSERT / UPSERT)
async function saveCard(){
 const team = document.getElementById('teamName').value.trim();
 if(!team) return alert('Voer een teamnaam in');
 
 const checked = [];
 document.querySelectorAll('#grid .cell').forEach((c,i) => {
   if(c.classList.contains('checked')) checked.push(i);
 });
 
 // Upsert zorgt ervoor dat als het team al bestaat, hij wordt geüpdatet. Anders maakt hij een nieuwe aan.
 const { error } = await _supabase
   .from('bingo_cards')
   .upsert({ team: team, checked: checked }, { onConflict: 'team' });

 if (error) {
   alert('Fout bij opslaan: ' + error.message);
 } else {
   alert('Kaart succesvol opgeslagen in database!');
   newCard();
   loadPublicCards();
   loadSavedCards();
 }
}

function newCard(){
 document.getElementById('teamName').value = '';
 updateTeamOverlay();
 document.querySelectorAll('#grid .cell').forEach(c => c.classList.remove('checked'));
 updateWinHighlights();
}

// INLADEN IN BEHEERDERSSCHERM
async function loadSavedCards(){
 const container = document.getElementById('savedCards');
 container.innerHTML = 'Laden...';
 
 const { data, error } = await _supabase
   .from('bingo_cards')
   .select('*')
   .order('team', { ascending: true });

 if(error) return container.innerHTML = 'Fout bij laden: ' + error.message;
 container.innerHTML = '';
 
 if(data.length === 0) {
   container.innerHTML = '<p>Geen kaarten gevonden.</p>';
   return;
 }

 globalCardsCached = data; // Cache updaten
 
 data.forEach(card => {
   const row = document.createElement('div');
   row.className = 'card-item';
   // Escapen van eventuele quotes in teamnaam voor de inline JS functions
   const safeTeam = card.team.replace(/'/g, "\\'");
   row.innerHTML = `<span>${card.team}</span>
   <span>
     <button onclick="editCard('${safeTeam}')">Bewerken</button>
     <button onclick="deleteCard('${safeTeam}')">Verwijderen</button>
   </span>`;
   container.appendChild(row);
 });
}

// INLADEN IN OPENBAAR OVERZICHT
async function loadPublicCards(){
 const container = document.getElementById('publicCardsContainer');
 container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Kaarten worden geladen...</p>';
 
 const { data, error } = await _supabase
   .from('bingo_cards')
   .select('*')
   .order('team', { ascending: true });

 if(error) return container.innerHTML = 'Fout bij laden: ' + error.message;
 container.innerHTML = '';
 
 globalCardsCached = data; // Cache updaten
 
 if(data.length === 0) {
   container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Nog geen bingokaarten opgeslagen.</p>';
   return;
 }
 
 // Bereken globale wins (rijen/kolommen die in minstens 1 kaart compleet zijn)
 const globalWins = getGlobalWins();
 
 data.forEach(card => {
   const cardDiv = document.createElement('div');
   cardDiv.className = 'public-card';
   const safeTeam = card.team.replace(/'/g, "\\'");
   
   cardDiv.innerHTML = `
     <h3>${card.team}</h3>
     <div class="mini-board">
       <div class="mini-grid"></div>
     </div>
     <button class="btn-preview" onclick="openPreview('${safeTeam}')">Bekijken</button>
   `;
   
   const miniGrid = cardDiv.querySelector('.mini-grid');
   for(let i = 0; i < 16; i++) {
     const miniCell = document.createElement('div');
     miniCell.className = 'mini-cell';
     if(card.checked && card.checked.includes(i)) miniCell.classList.add('checked');
     miniGrid.appendChild(miniCell);
   }
   
   // Voeg per-kaart wins toe (groen - alleen voor deze kaart)
   const checked = new Array(16).fill(false);
   (card.checked || []).forEach(i => checked[i] = true);
   
   for(let row = 0; row < 4; row++) {
     if(checked.slice(row*4, row*4 + 4).every(Boolean)) {
       const overlay = document.createElement('div');
       overlay.className = 'win-overlay';
       overlay.style.top = `${row * 25}%`;
       overlay.style.left = '0%';
       overlay.style.width = '100%';
       overlay.style.height = '25%';
       overlay.style.position = 'absolute';
       overlay.style.zIndex = '10';
       miniGrid.appendChild(overlay);
     }
   }
   
   for(let col = 0; col < 4; col++) {
     if([0,1,2,3].every(r => checked[r*4 + col])) {
       const overlay = document.createElement('div');
       overlay.className = 'win-overlay';
       overlay.style.top = '0%';
       overlay.style.left = `${col * 25}%`;
       overlay.style.width = '25%';
       overlay.style.height = '100%';
       overlay.style.position = 'absolute';
       overlay.style.zIndex = '10';
       miniGrid.appendChild(overlay);
     }
   }
   
   // Voeg globale wins toe (oranje - voor alle kaarten samen)
   globalWins.rowWins.forEach(row => {
     const overlay = document.createElement('div');
     overlay.className = 'global-win-overlay';
     overlay.style.top = `${row * 25}%`;
     overlay.style.left = '0%';
     overlay.style.width = '100%';
     overlay.style.height = '25%';
     overlay.style.position = 'absolute';
     overlay.style.zIndex = '8';
     miniGrid.appendChild(overlay);
   });
   
   globalWins.colWins.forEach(col => {
     const overlay = document.createElement('div');
     overlay.className = 'global-win-overlay';
     overlay.style.top = '0%';
     overlay.style.left = `${col * 25}%`;
     overlay.style.width = '25%';
     overlay.style.height = '100%';
     overlay.style.position = 'absolute';
     overlay.style.zIndex = '8';
     miniGrid.appendChild(overlay);
   });
   
   container.appendChild(cardDiv);
 });
}

function openPreview(teamName) {
 const data = globalCardsCached.find(c => c.team === teamName);
 if(!data) return;
 
 document.getElementById('previewTeamOverlay').innerText = data.team;
 
 const previewCells = document.querySelectorAll('#previewGrid .cell');
 previewCells.forEach((cell, i) => {
   cell.classList.toggle('checked', data.checked.includes(i));
 });

 // Remove all old overlays
 document.querySelectorAll('#previewGrid .win-overlay').forEach(el => el.remove());
 document.querySelectorAll('#previewGrid .global-win-overlay').forEach(el => el.remove());
 
 const previewGrid = document.getElementById('previewGrid');
 
 // Add per-card wins (groen) voor deze kaart
 const checked = new Array(16).fill(false);
 (data.checked || []).forEach(i => checked[i] = true);
 
 for(let row = 0; row < 4; row++) {
   if(checked.slice(row*4, row*4 + 4).every(Boolean)) {
     const overlay = document.createElement('div');
     overlay.className = 'win-overlay';
     overlay.style.top = `${row * 25}%`;
     overlay.style.left = '0%';
     overlay.style.width = '100%';
     overlay.style.height = '25%';
     previewGrid.appendChild(overlay);
   }
 }
 
 for(let col = 0; col < 4; col++) {
   if([0,1,2,3].every(r => checked[r*4 + col])) {
     const overlay = document.createElement('div');
     overlay.className = 'win-overlay';
     overlay.style.top = '0%';
     overlay.style.left = `${col * 25}%`;
     overlay.style.width = '25%';
     overlay.style.height = '100%';
     previewGrid.appendChild(overlay);
   }
 }
 
 // Add global wins (oranje) voor alle kaarten samen
 const global = getGlobalWins();
 global.rowWins.forEach(r => createWinOverlay(previewGrid, 'row', r, 'global-win-overlay'));
 global.colWins.forEach(c => createWinOverlay(previewGrid, 'col', c, 'global-win-overlay'));
 
 document.getElementById('previewModal').classList.add('active');
}

// GLOBAL WINS BEREKENING
function getGlobalWins() {
  const rowWins = new Set();
  const colWins = new Set();
  globalCardsCached.forEach(card => {
    const checked = new Array(16).fill(false);
    (card.checked || []).forEach(i => checked[i] = true);
    for(let r = 0; r < 4; r++) {
      if(checked.slice(r*4, r*4 + 4).every(Boolean)) rowWins.add(r);
    }
    for(let c = 0; c < 4; c++) {
      if([0,1,2,3].every(r => checked[r*4 + c])) colWins.add(c);
    }
  });
  return { rowWins: Array.from(rowWins), colWins: Array.from(colWins) };
}

function createWinOverlay(container, type, index, className) {
  const overlay = document.createElement('div');
  overlay.className = className;
  if(type === 'row') {
    overlay.style.top = `${index * 25}%`;
    overlay.style.left = '0%';
    overlay.style.width = '100%';
    overlay.style.height = '25%';
  } else {
    overlay.style.top = '0%';
    overlay.style.left = `${index * 25}%`;
    overlay.style.width = '25%';
    overlay.style.height = '100%';
  }
  container.appendChild(overlay);
}

function updateWinHighlights() {
  const checked = Array.from(document.querySelectorAll('#grid .cell')).map(c => c.classList.contains('checked'));
  const container = document.getElementById('grid');
  document.querySelectorAll('#grid .win-overlay').forEach(el => el.remove());

  for(let row = 0; row < 4; row++) {
    if(checked.slice(row*4, row*4+4).every(v => v)) createWinOverlay(container, 'row', row, 'win-overlay');
  }
  for(let col = 0; col < 4; col++) {
    if([0,1,2,3].every(r => checked[r*4 + col])) createWinOverlay(container, 'col', col, 'win-overlay');
  }
}

// Screenshot alle kaarten
async function takeAllCardsScreenshot() {
  const tempContainer = document.createElement('div');
  tempContainer.style.position = 'absolute';
  tempContainer.style.left = '-9999px';
  tempContainer.style.background = '#111';
  tempContainer.style.padding = '40px';
  tempContainer.style.width = '820px';
  document.body.appendChild(tempContainer);

  const title = document.createElement('h2');
  title.textContent = '🌴 Jungle Bingo - Alle Kaarten';
  title.style.color = '#fff';
  title.style.textAlign = 'center';
  title.style.marginBottom = '40px';
  tempContainer.appendChild(title);

  document.querySelectorAll('.public-card').forEach(card => {
    const clone = card.cloneNode(true);
    clone.style.marginBottom = '50px';
    clone.style.boxShadow = '0 15px 35px rgba(0,0,0,0.7)';
    tempContainer.appendChild(clone);
  });

  try {
    const canvas = await html2canvas(tempContainer, { scale: 2, backgroundColor: '#111' });
    const link = document.createElement('a');
    link.download = `Jungle_Bingo_Alle_Kaarten_${new Date().toISOString().slice(0,10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Screenshot maken mislukt.');
  }

  document.body.removeChild(tempContainer);
}

function editCard(team){
  if(!unlockEdit()) return;
  const data = globalCardsCached.find(c => c.team === team);
  if(!data) return;

  showTab('editor');
  newCard();
  document.getElementById('teamName').value = data.team;
  updateTeamOverlay();
  data.checked.forEach(i => {
    if(document.querySelectorAll('#grid .cell')[i]) {
      document.querySelectorAll('#grid .cell')[i].classList.add('checked');
    }
  });
  updateWinHighlights();
}

async function deleteCard(team){
  if(!unlockEdit()) return;
  if(confirm('Kaart verwijderen?')){
    const { error } = await _supabase
      .from('bingo_cards')
      .delete()
      .eq('team', team);
    
    if(error) {
      alert('Fout bij verwijderen: ' + error.message);
    } else {
      loadSavedCards();
      loadPublicCards();
    }
  }
}

function takeScreenshot() {
  const teamName = document.getElementById('teamName').value.trim() || "Jungle Bingo";
  const checked = [];
  document.querySelectorAll('#grid .cell').forEach((c,i) => {
    if(c.classList.contains('checked')) checked.push(i);
  });
  
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = './bingo templateV1.png';
  img.onload = function() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = img.width; canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
   
    ctx.font = "bold 48px Copperplate";
    ctx.fillStyle = "#f5d76e";
    ctx.shadowColor = "rgba(0,0,0,0.9)";
    ctx.shadowBlur = 8; ctx.shadowOffsetX = 4; ctx.shadowOffsetY = 4;
    ctx.textAlign = "center";
    ctx.fillText(teamName.toUpperCase(), canvas.width / 2, canvas.height * 0.085);
   
    ctx.shadowBlur = 0;
    const gridTop = canvas.height * 0.12;
    const gridLeft = canvas.width * 0.115;
    const gridSize = canvas.width * 0.77;
    const cellSize = gridSize / 4;
    
    // Teken X'en voor gemarkeerde cellen
    checked.forEach(index => {
      const row = Math.floor(index / 4);
      const col = index % 4;
      const centerX = gridLeft + (col * cellSize) + (cellSize / 2);
      const centerY = gridTop + (row * cellSize) + (cellSize / 2);
      const lineLength = cellSize * 0.4;
     
      ctx.strokeStyle = "rgba(0, 255, 80, 0.55)";
      ctx.lineWidth = 18;
      ctx.lineCap = "round";
     
      ctx.beginPath(); ctx.moveTo(centerX - lineLength, centerY - lineLength); ctx.lineTo(centerX + lineLength, centerY + lineLength); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(centerX - lineLength, centerY + lineLength); ctx.lineTo(centerX + lineLength, centerY - lineLength); ctx.stroke();
    });
    
    // Teken per-kaart wins (groen) voor volledige rijen/kolommen van deze kaart
    const checkedArray = new Array(16).fill(false);
    checked.forEach(i => checkedArray[i] = true);
    
    ctx.fillStyle = "rgba(0, 255, 80, 0.25)";
    ctx.shadowColor = "rgba(0, 255, 80, 0.8)";
    ctx.shadowBlur = 15;
    
    for(let row = 0; row < 4; row++) {
      if(checkedArray.slice(row*4, row*4 + 4).every(Boolean)) {
        const y = gridTop + (row * cellSize);
        ctx.fillRect(gridLeft, y, gridSize, cellSize);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(0, 255, 80, 0.9)";
        ctx.lineWidth = 3;
        ctx.strokeRect(gridLeft, y, gridSize, cellSize);
        ctx.shadowBlur = 15;
      }
    }
    
    for(let col = 0; col < 4; col++) {
      if([0,1,2,3].every(r => checkedArray[r*4 + col])) {
        const x = gridLeft + (col * cellSize);
        ctx.fillRect(x, gridTop, cellSize, gridSize);
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(0, 255, 80, 0.9)";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, gridTop, cellSize, gridSize);
        ctx.shadowBlur = 15;
      }
    }
    
    // Teken globale wins (oranje) - rijen/kolommen compleet in minstens 1 kaart
    const globalWins = getGlobalWins();
    ctx.fillStyle = "rgba(255, 140, 0, 0.25)";
    ctx.shadowColor = "rgba(255, 140, 0, 0.8)";
    ctx.shadowBlur = 15;
    
    globalWins.rowWins.forEach(row => {
      const y = gridTop + (row * cellSize);
      ctx.fillRect(gridLeft, y, gridSize, cellSize);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(255, 140, 0, 0.9)";
      ctx.lineWidth = 3;
      ctx.strokeRect(gridLeft, y, gridSize, cellSize);
      ctx.shadowBlur = 15;
    });
    
    globalWins.colWins.forEach(col => {
      const x = gridLeft + (col * cellSize);
      ctx.fillRect(x, gridTop, cellSize, gridSize);
      ctx.shadowBlur = 0;
      ctx.strokeStyle = "rgba(255, 140, 0, 0.9)";
      ctx.lineWidth = 3;
      ctx.strokeRect(x, gridTop, cellSize, gridSize);
      ctx.shadowBlur = 15;
    });
   
    const link = document.createElement('a');
    link.download = `Bingo_${teamName.replace(/[^a-z0-9]/gi, '_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
}

function closePreview(event) {
  if(!event || event.target.id === 'previewModal') {
    document.getElementById('previewModal').classList.remove('active');
  }
}
</script>
