<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Bingo Beheer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart */
.bingo-board{
 position:relative;width:min(90vw,600px);aspect-ratio:1/1;margin:0 auto;
 background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:2.5%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#46510e;text-shadow: 1px 1px 10px rgba(255,255,255,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:1px;
}
.grid{
 position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:85%;height:14px;background:rgba(0,255,80,.45);border-radius:999px;
}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* CSS voor de donkere transparante Bingo balken */
.bingo-bar {
 position: absolute;
 background: rgba(0, 0, 0, 0.65); /* Donkere transparante balk */
 border-radius: 8px;
 pointer-events: none; /* Zorgt dat cellen klikbaar blijven */
 z-index: 5;
 display: none;
}
.bingo-bar.active {
 display: block;
}
/* Rij posities */
.bar-row-0 { top: 0%; left: 0%; width: 100%; height: 25%; }
.bar-row-1 { top: 25%; left: 0%; width: 100%; height: 25%; }
.bar-row-2 { top: 50%; left: 0%; width: 100%; height: 25%; }
.bar-row-3 { top: 75%; left: 0%; width: 100%; height: 25%; }
/* Kolom posities */
.bar-col-0 { top: 0%; left: 0%; width: 25%; height: 100%; }
.bar-col-1 { top: 0%; left: 25%; width: 25%; height: 100%; }
.bar-col-2 { top: 0%; left: 50%; width: 25%; height: 100%; }
.bar-col-3 { top: 0%; left: 75%; width: 25%; height: 100%; }

/* Overzichtskaarten openbaar */
.public-grid-container {
 display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;
}
.public-card {
 background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;
 display:flex;flex-direction:column;align-items:center;gap:10px;
}
.public-card h3 {
 margin:0;font-size:16px;text-transform:uppercase;color:#939168;text-align:center;
 width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-board {
 position:relative;width:100%;aspect-ratio:1/1;
 background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
}
.mini-grid {
 position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
}
.mini-cell { position:relative; }
.mini-cell.checked::before,.mini-cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:85%;height:4px;background:rgba(0,255,80,.6);border-radius:999px;
}
.mini-cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.mini-cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.public-card button { width:100%; margin-top:5px; }

/* Preview Modal */
.preview-modal {
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;
 padding:20px;
}
.preview-modal.active { display:flex; }
.modal-content {
 position:relative;width:100%;max-width:650px;
 display:flex;flex-direction:column;gap:15px;
}
.modal-close {
 position:absolute;top:-45px;right:0;font-size:32px;color:white;
 background:none;border:none;cursor:pointer;font-weight:bold;
}
.modal-close:hover { color:#ff9800; }

.card-item {
 display: flex; justify-content: space-between; align-items: center;
 background: rgba(34,34,34,0.9); padding: 10px 15px; border-radius: 8px;
 margin-bottom: 8px; border: 1px solid #444;
}
</style>
</head>
<body>

<div class="tabs">
<button onclick="showTab('public')">Overzicht Kaarten</button>
<button onclick="showTab('editor')">Bingo Kaart Editor</button>
<button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<div id="public" class="panel active">
<h2>Actueel Overzicht van alle deelnemende kaarten</h2>
<p>Klik op "Bekijken" om een kaart te bekijken.</p>
<div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<div id="editor" class="panel">
<div class="controls">
<input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
<button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
<button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
<button class="btn-undo" onclick="undoAction()">↩️ Ongedaan maken</button>
<button onclick="newCard()">Nieuwe kaart</button>
</div>

<div class="bingo-board" id="editorBoard">
<div id="teamOverlay" class="team-overlay"></div>
<div class="grid" id="grid"></div>
<div class="bingo-bar bar-row-0" data-type="row" data-index="0"></div>
<div class="bingo-bar bar-row-1" data-type="row" data-index="1"></div>
<div class="bingo-bar bar-row-2" data-type="row" data-index="2"></div>
<div class="bingo-bar bar-row-3" data-type="row" data-index="3"></div>
<div class="bingo-bar bar-col-0" data-type="col" data-index="0"></div>
<div class="bingo-bar bar-col-1" data-type="col" data-index="1"></div>
<div class="bingo-bar bar-col-2" data-type="col" data-index="2"></div>
<div class="bingo-bar bar-col-3" data-type="col" data-index="3"></div>
</div>
</div>

<div id="saved" class="panel">
<h2>Opgeslagen kaarten (Beheer)</h2>
<div id="savedCards"></div>
</div>

<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <button class="modal-close" onclick="closePreview(null)">&times;</button>
   <div class="bingo-board" id="previewBoard">
     <div id="previewTeamOverlay" class="team-overlay"></div>
     <div id="previewGrid" class="grid"></div>
     <div class="bingo-bar bar-row-0" data-type="row" data-index="0"></div>
     <div class="bingo-bar bar-row-1" data-type="row" data-index="1"></div>
     <div class="bingo-bar bar-row-2" data-type="row" data-index="2"></div>
     <div class="bingo-bar bar-row-3" data-type="row" data-index="3"></div>
     <div class="bingo-bar bar-col-0" data-type="col" data-index="0"></div>
     <div class="bingo-bar bar-col-1" data-type="col" data-index="1"></div>
     <div class="bingo-bar bar-col-2" data-type="col" data-index="2"></div>
     <div class="bingo-bar bar-col-3" data-type="col" data-index="3"></div>
   </div>
 </div>
</div>

<script>
const PASSWORD = "1337";
let editUnlocked = false;
let actionHistory = [];

document.addEventListener("DOMContentLoaded", () => {
 loadPublicCards();
 buildEditorGrid();
 buildPreviewGrid();
});

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p === PASSWORD){ editUnlocked = true; return true; }
 alert("Onjuiste code");
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 const name = document.getElementById('teamName').value;
 document.getElementById('teamOverlay').innerText = name;
}

// Controleert rijen en kolommen op een Bingo (4 kruisen)
function checkBingoLines(checkedArray) {
  const activeRows = [];
  const activeCols = [];

  // Controleer Rijen (horizontaal)
  for (let row = 0; row < 4; row++) {
    let rowCells = [row*4, row*4+1, row*4+2, row*4+3];
    if (rowCells.every(index => checkedArray.includes(index))) {
      activeRows.push(row);
    }
  }

  // Controleer Kolommen (onder/boven elkaar)
  for (let col = 0; col < 4; col++) {
    let colCells = [col, col+4, col+8, col+12];
    if (colCells.every(index => checkedArray.includes(index))) {
      activeCols.push(col);
    }
  }

  return { rows: activeRows, cols: activeCols };
}

// Functie om balken in een specifiek board te updaten
function updateBoardBars(boardId, checkedArray) {
  const board = document.getElementById(boardId);
  if (!board) return;
  const lines = checkBingoLines(checkedArray);
  
  board.querySelectorAll('.bingo-bar').forEach(bar => {
    const type = bar.getAttribute('data-type');
    const index = parseInt(bar.getAttribute('data-index'));
    
    if (type === 'row' && lines.rows.includes(index)) {
      bar.classList.add('active');
    } else if (type === 'col' && lines.cols.includes(index)) {
      bar.classList.add('active');
    } else {
      bar.classList.remove('active');
    }
  });
}

function saveStateToHistory() {
  const currentChecked = [];
  document.querySelectorAll('#grid .cell').forEach((c, i) => {
    if(c.classList.contains('checked')) currentChecked.push(i);
  });
  actionHistory.push(JSON.stringify(currentChecked));
}

function undoAction() {
  if(!unlockEdit()) return;
  if (actionHistory.length <= 1) {
    newCardKeepName();
    return;
  }
  actionHistory.pop();
  const previousState = JSON.parse(actionHistory[actionHistory.length - 1]);
  document.querySelectorAll('#grid .cell').forEach((cell, i) => {
    if (previousState.includes(i)) {
      cell.classList.add('checked');
    } else {
      cell.classList.remove('checked');
    }
  });
  updateBoardBars('editorBoard', previousState);
}

function buildEditorGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  c.onclick = () => {
    if(!unlockEdit()) return;
    c.classList.toggle('checked');
    saveStateToHistory();
    const checked = [];
    document.querySelectorAll('#grid .cell').forEach((cell, idx) => {
      if(cell.classList.contains('checked')) checked.push(idx);
    });
    updateBoardBars('editorBoard', checked);
  };
  grid.appendChild(c);
 }
 saveStateToHistory();
}

function buildPreviewGrid() {
 const pGrid = document.getElementById('previewGrid');
 pGrid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  pGrid.appendChild(c);
 }
}

function saveCard(){
 const team = document.getElementById('teamName').value.trim();
 if(!team) return alert('Voer een teamnaam in');
 const checked = [];
 document.querySelectorAll('#grid .cell').forEach((c,i) => {
   if(c.classList.contains('checked')) checked.push(i);
 });
 localStorage.setItem('bingo_' + team, JSON.stringify({team, checked}));
 alert('Kaart opgeslagen!');
 loadSavedCards();
 loadPublicCards();
}

function newCard(){
 document.getElementById('teamName').value = '';
 updateTeamOverlay();
 newCardKeepName();
}

function newCardKeepName() {
 document.querySelectorAll('#grid .cell
