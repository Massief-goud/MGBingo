<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">

    <title>Jungle Bingo Beheer</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ... (Houd je bestaande CSS van de vorige stap aan) ... */
        /* Zorg dat de .bingo-line-layer en .grid correct gepositioneerd zijn */
        .bingo-board { position:relative; width:min(90vw,600px); aspect-ratio:1/1; margin:0 auto; background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat; }
        .grid { position:absolute; top:10.5%; left:10.5%; width:79%; height:79%; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(4,1fr); z-index:2; }
        .cell { position:relative; cursor:pointer; }
        .bingo-line-layer { position:absolute; inset:10.5%; pointer-events:none; z-index:5; }
        /* ... (rest van de CSS) ... */
    </style>
</head>
<body>

<script>
    // 1. Supabase Configuratie
    const supabaseUrl = 'https://fjzwtjgtmlrcwiytpyqw.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqend0amd0bWxyY3dpeXRweXF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTE1ODIsImV4cCI6MjA5NjE2NzU4Mn0.ne13FbGpwDq-qINjCCFBsM6EZgJeJK3LjxxEGM8Qw9M';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // 2. Bestaande logica (Lijnen & Grid)
    // [Voeg hier de getBingoLines, updateBingoLines en buildEditorGrid functies uit de vorige stap toe]

    // 3. Supabase Opslag Functie
    async function saveToSupabase() {
        const team = document.getElementById('teamName').value.trim();
        const checked = [];
        document.querySelectorAll('#grid .cell').forEach((c, i) => {
            if(c.classList.contains('checked')) checked.push(i);
        });

        if(!team) return alert('Vul een teamnaam in!');

        const { data, error } = await supabase
            .from('bingo_kaarten') // Zorg dat deze tabel bestaat in Supabase
            .upsert([
                { team_naam: team, checked_indices: checked }
            ]);

        if(error) {
            console.error('Fout bij opslaan:', error);
            alert('Opslaan mislukt: ' + error.message);
        } else {
            alert('Kaart succesvol opgeslagen in de database!');
        }
    }

    // Pas je bestaande save-knop aan:
    // <button class="btn-save" onclick="saveToSupabase()">💾 Opslaan in DB</button>
</script>

</body>
