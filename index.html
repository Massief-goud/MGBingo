<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Bingo Beheer</title>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart */
.bingo-board{
 position:relative;width:min(90vw,600px);aspect-ratio:1/1;margin:0 auto;
 background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:2.5%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#46510e;text-shadow: 1px 1px 10px rgba(255,255,255,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:1px;
}
.grid{
 position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
 gap:8px;
 z-index:2;
}
.cell{
 position:relative;
 background:rgba(17,17,17,0.85);
 border:1px solid #444;
 border-radius:10px;
 cursor:pointer;
 display:flex;
 align-items:center;
 justify-content:center;
 text-align:center;
 padding:5px;
 font-size:calc(10px + 0.8vw);
 color:#ddd;
}
.cell.checked::after{
 content:"✕";
 position:absolute;
 inset:0;
 display:flex;
 align-items:center;
 justify-content:center;
 color:#00ff4c;
 font-size:58px;
 font-weight:900;
 text-shadow:0 0 10px #00ff4c;
 z-index:4;
 pointer-events:none;
}

/* Bingo lijnen */
.bingo-line-layer{
 position:absolute;
 inset:0;
 pointer-events:none;
 z-index:5;
}
.bingo-line{
 position:absolute;
 background:rgba(255,255,255,0.38);
 border:2px solid rgba(255,255,255,0.65);
 border-radius:18px;
 box-shadow:0 0 18px rgba(255,255,255,0.55);
}
.bingo-line.row{
 left:0; width:100%; height:20%;
}
.bingo-line.col{
 top:0; width:20%; height:100%;
}

/* Overzichtskaarten */
.public-grid-container {
 display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px;
}
.public-card {
 background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;
 display:flex;flex-direction:column;align-items:center;gap:10px;
}
.public-card h3 {
 margin:0;font-size:16px;text-transform:uppercase;color:#939168;text-align:center;
 width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.mini-board {
 position:relative;width:100%;aspect-ratio:1/1;
 background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
}
.mini-grid {
 position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
 gap:4px;
}
.mini-cell { 
 position:relative; 
 background:rgba(17,17,17,0.85);
 border:1px solid #444;
 border-radius:6px;
}
.mini-cell.checked::after{
 content:"✕";
 position:absolute;
 inset:0;
 display:flex;
 align-items:center;
 justify-content:center;
 color:#00ff4c;
 font-size:28px;
 font-weight:900;
}
.public-card button { width:100%; margin-top:5px; }

/* Preview Modal */
.preview-modal {
 display:none;position:fixed;top:0;left:0;width:100%;height:100%;
 background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;
 padding:20px;
}
.preview-modal.active { display:flex; }
.modal-content {
 position:relative;width:100%;max-width:650px;
 display:flex;flex-direction:column;gap:15px;
}
.modal-close {
 position:absolute;top:-45px;right:0;font-size:32px;color:white;
 background:none;border:none;cursor:pointer;font-weight:bold;
}
.modal-close:hover { color:#ff9800; }

#bingoAlert {
 position:absolute;
 top:15%;
 left:50%;
 transform:translateX(-50%);
 background:rgba(255,215,0,0.95);
 color:#000;
 padding:15px 40px;
 font-size:2.5rem;
 font-weight:bold;
 border-radius:20px;
 box-shadow:0 0 30px gold;
 display:none;
 z-index:10;
 pointer-events:none;
 text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div class="tabs">
<button onclick="showTab('public')">Overzicht Kaarten</button>
<button onclick="showTab('editor')">Bingo Kaart Editor</button>
<button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<!-- Openbaar overzicht -->
<div id="public" class="panel active">
<h2>Actueel Overzicht van alle deelnemende kaarten</h2>
<p>Klik op "Bekijken" om een kaart te bekijken.</p>
<div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<!-- Editor -->
<div id="editor" class="panel">
<div class="controls">
<input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
<button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
<button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
<button onclick="newCard()">Nieuwe kaart</button>
</div>

<div class="bingo-board" id="mainBoard">
<div id="teamOverlay" class="team-overlay"></div>
<div id="bingoAlert">BINGO!</div>
<div class="grid" id="grid"></div>
<div id="bingoLineLayer" class="bingo-line-layer"></div>
</div>
</div>

<!-- Staff paneel -->
<div id="saved" class="panel">
<h2>Opgeslagen kaarten (Beheer)</h2>
<div id="savedCards"></div>
</div>

<!-- Preview Modal -->
<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <button class="modal-close" onclick="closePreview(null)">&times;</button>
   <div class="bingo-board">
     <div id="previewTeamOverlay" class="team-overlay"></div>
     <div id="previewGrid" class="grid"></div>
     <div id="previewLineLayer" class="bingo-line-layer"></div>
   </div>
 </div>
</div>

<script>
const PASSWORD = "1337";
let editUnlocked = false;
let currentCard = { cells: Array(16).fill(""), checked: [] };

document.addEventListener("DOMContentLoaded", () => {
  loadPublicCards();
  buildEditorGrid();
  buildPreviewGrid();
});

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p === PASSWORD){ editUnlocked = true; return true; }
 alert("Onjuiste code");
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 const name = document.getElementById('teamName').value;
 document.getElementById('teamOverlay').innerText = name;
}

function buildEditorGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 currentCard.cells = currentCard.cells.length === 16 ? currentCard.cells : Array(16).fill("");

 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  c.textContent = currentCard.cells[i] || `Vak ${i+1}`;
  c.contentEditable = true;
  
  c.addEventListener('blur', () => {
    currentCard.cells[i] = c.textContent.trim();
  });

  c.addEventListener('click', (e) => {
    if(e.target.contentEditable === "true") return;
    if(!unlockEdit()) return;
    c.classList.toggle('checked');
    if(c.classList.contains('checked')){
      if(!currentCard.checked.includes(i)) currentCard.checked.push(i);
    } else {
      currentCard.checked = currentCard.checked.filter(x => x !== i);
    }
    updateBingoLines();
  });

  grid.appendChild(c);
 }
 updateBingoLines();
}

function updateBingoLines() {
 const layer = document.getElementById('bingoLineLayer');
 layer.innerHTML = '';

 const checkedSet = new Set(currentCard.checked);
 const winLines = [
   { type:"row", index:0, cells:[0,1,2,3] },
   { type:"row", index:1, cells:[4,5,6,7] },
   { type:"row", index:2, cells:[8,9,10,11] },
   { type:"row", index:3, cells:[12,13,14,15] },
   { type:"col", index:0, cells:[0,4,8,12] },
   { type:"col", index:1, cells:[1,5,9,13] },
   { type:"col", index:2, cells:[2,6,10,14] },
   { type:"col", index:3, cells:[3,7,11,15] }
 ];

 const bingos = winLines.filter(line => line.cells.every(i => checkedSet.has(i)));

 bingos.forEach(line => {
   const div = document.createElement("div");
   div.className = `bingo-line ${line.type}`;
   if(line.type === "row") div.style.top = (line.index * 25 + 2.5) + "%";
   if(line.type === "col") div.style.left = (line.index * 25 + 2.5) + "%";
   layer.appendChild(div);
 });

 // Bingo melding
 const alertEl = document.getElementById('bingoAlert');
 alertEl.style.display = bingos.length > 0 ? 'block' : 'none';
}

function buildPreviewGrid() {
 const pGrid = document.getElementById('previewGrid');
 pGrid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  pGrid.appendChild(c);
 }
}

function saveCard(){
 const team = document.getElementById('teamName').value.trim();
 if(!team) return alert('Voer een teamnaam in');
 
 currentCard.team = team;
 localStorage.setItem('bingo_' + team, JSON.stringify(currentCard));
 alert('Kaart opgeslagen!');
 loadSavedCards();
 loadPublicCards();
}

function newCard(){
 document.getElementById('teamName').value = '';
 updateTeamOverlay();
 currentCard = { cells: Array(16).fill(""), checked: [] };
 buildEditorGrid();
}

function loadSavedCards(){
 const container = document.getElementById('savedCards');
 container.innerHTML = '';
 
 Object.keys(localStorage)
 .filter(k => k.startsWith('bingo_'))
 .forEach(key => {
   const data = JSON.parse(localStorage.getItem(key));
   const row = document.createElement('div');
   row.style.margin = "10px 0";
   row.style.padding = "10px";
   row.style.background = "rgba(34,34,34,0.8)";
   row.style.borderRadius = "8px";
   row.innerHTML = `<strong>${data.team}</strong>
   <button onclick="editCard('${data.team.replace(/'/g,"\\'")}')">Bewerken</button>
   <button onclick="deleteCard('${data.team.replace(/'/g,"\\'")}')">Verwijderen</button>`;
   container.appendChild(row);
 });
}

function loadPublicCards(){
 const container = document.getElementById('publicCardsContainer');
 container.innerHTML = '';
 
 const keys = Object.keys(localStorage).filter(k => k.startsWith('bingo_'));
 
 if(keys.length === 0) {
   container.innerHTML = '<p style="grid-column: 1/-1; color: #aaa;">Nog geen bingokaarten opgeslagen.</p>';
   return;
 }
 
 keys.forEach(key => {
   const data = JSON.parse(localStorage.getItem(key));
   const cardDiv = document.createElement('div');
   cardDiv.className = 'public-card';
   
   cardDiv.innerHTML = `
     <h3>${data.team}</h3>
     <div class="mini-board">
       <div class="mini-grid" id="mini_${data.team}"></div>
     </div>
     <button class="btn-preview" onclick="openPreview('${data.team.replace(/'/g, "\\'")}')">Bekijken</button>
   `;
   
   const miniGrid = cardDiv.querySelector('.mini-grid');
   for(let i = 0; i < 16; i++) {
     const miniCell = document.createElement('div');
     miniCell.className = 'mini-cell';
     if(data.checked && data.checked.includes(i)) miniCell.classList.add('checked');
     miniCell.textContent = (data.cells && data.cells[i]) ? data.cells[i].substring(0,3) : '';
     miniGrid.appendChild(miniCell);
   }
   container.appendChild(cardDiv);
 });
}

function openPreview(teamName) {
 const data = JSON.parse(localStorage.getItem('bingo_' + teamName));
 if(!data) return;
 
 document.getElementById('previewTeamOverlay').innerText = data.team;
 
 const previewCells = document.querySelectorAll('#previewGrid .cell');
 previewCells.forEach((cell, i) => {
   cell.textContent = (data.cells && data.cells[i]) || '';
   cell.classList.toggle('checked', data.checked && data.checked.includes(i));
 });
 
 document.getElementById('previewModal').classList.add('active');
}

function closePreview(event) {
 if(!event || event.target.id === 'previewModal') {
   document.getElementById('previewModal').classList.remove('active');
 }
}

function editCard(team){
 if(!unlockEdit()) return;
 const data = JSON.parse(localStorage.getItem('bingo_'+team));
 showTab('editor');
 document.getElementById('teamName').value = data.team;
 updateTeamOverlay();
 currentCard = {...data};
 buildEditorGrid();
}

function deleteCard(team){
 if(!unlockEdit()) return;
 if(confirm('Kaart verwijderen?')){
   localStorage.removeItem('bingo_'+team);
   loadSavedCards();
   loadPublicCards();
 }
}

function takeScreenshot() {
  // ... (screenshot functie kan later uitgebreid worden)
  alert("Screenshot functionaliteit is nog in basisvorm. Wil je dat ik deze ook verbeter?");
}
</script>
</body>
</html>
