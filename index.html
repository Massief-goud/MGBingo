<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Bingo Beheer</title>
<style>
*{box-sizing:border-box}
body{
 font-family:Arial,sans-serif;
 background: url('https://i.postimg.cc/QNKW18c2/pexels-harsh-srivastava-1765262842-30201600.jpg') center/cover no-repeat fixed;
 color:white;
 margin:0;
 padding:20px;
}
.tabs{display:flex;gap:10px;margin-bottom:15px}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer;background:rgba(68, 68, 68, 0.9);color:white;font-weight:bold}
button:hover{background:rgba(85, 85, 85, 0.9)}
.btn-save{background:rgba(0, 188, 212, 0.9);color:black}
.btn-screenshot{background:rgba(76, 175, 80, 0.9);color:white}
.btn-preview{background:rgba(255, 152, 0, 0.9);color:black}
input{padding:10px;border-radius:8px;border:none;background:rgba(34, 34, 34, 0.9);color:white;border:1px solid #444}
.panel{display:none}
.panel.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}

/* Bingo Kaart & Lijnen */
.bingo-board{
 position:relative;width:min(90vw,600px);aspect-ratio:1/1;margin:0 auto;
 background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat;
}
.team-overlay {
 position:absolute;top:2.5%;left:0;width:100%;
 text-align:center;font-size:calc(14px + 1.5vw);font-weight:Bold;
 color:#46510e;text-shadow: 1px 1px 10px rgba(255,255,255,0.9);
 pointer-events:none;text-transform:uppercase;letter-spacing:1px;
}
.grid{
 position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;
 display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);
 z-index:2;
}
.cell{position:relative;cursor:pointer}
.cell.checked::before,.cell.checked::after{
 content:"";position:absolute;top:50%;left:50%;
 width:85%;height:14px;background:rgba(0,255,80,.35);border-radius:999px;
}
.cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}

/* Bingo lijnen laag */
.bingo-line-layer { position:absolute; inset:10.5%; pointer-events:none; z-index:5; }
.bingo-line { position:absolute; background:rgba(255,255,255,0.2); border:4px solid rgba(255,255,255,0.5); border-radius:20px; box-shadow:0 0 15px rgba(255,255,255,0.4); }
.bingo-line.row { left:0; width:100%; height:12%; }
.bingo-line.col { top:0; width:12%; height:100%; }
.bingo-line.diag { left:50%; top:50%; width:130%; height:10%; transform-origin:center; }

/* Overzichtskaarten & Modals */
.public-grid-container { display:grid;grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));gap:20px;margin-top:15px; }
.public-card { background:rgba(34, 34, 34, 0.9);border:1px solid #333;border-radius:12px;padding:15px;display:flex;flex-direction:column;align-items:center;gap:10px; }
.mini-board { position:relative;width:100%;aspect-ratio:1/1;background:url('https://i.postimg.cc/cHXMXPfN/bingo-template.png') center/contain no-repeat; }
.mini-grid { position:absolute;top:10.5%;left:10.5%;width:79%;height:79%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr); }
.mini-cell.checked::before,.mini-cell.checked::after{content:"";position:absolute;top:50%;left:50%;width:85%;height:4px;background:rgba(0,255,80,.6);border-radius:999px;}
.mini-cell.checked::before{transform:translate(-50%,-50%) rotate(45deg)}
.mini-cell.checked::after{transform:translate(-50%,-50%) rotate(-45deg)}
.preview-modal { display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;justify-content:center;align-items:center;padding:20px; }
.preview-modal.active { display:flex; }
</style>
</head>
<body>

<div class="tabs">
 <button onclick="showTab('public')">Overzicht Kaarten</button>
 <button onclick="showTab('editor')">Bingo Kaart Editor</button>
 <button onclick="showTab('saved')">Opgeslagen Kaarten (Staff)</button>
</div>

<div id="public" class="panel active">
 <h2>Actueel Overzicht</h2>
 <div id="publicCardsContainer" class="public-grid-container"></div>
</div>

<div id="editor" class="panel">
 <div class="controls">
  <input id="teamName" placeholder="Teamnaam" oninput="updateTeamOverlay()">
  <button class="btn-save" onclick="saveCard()">💾 Opslaan</button>
  <button class="btn-screenshot" onclick="takeScreenshot()">📷 Screenshot</button>
  <button onclick="newCard()">Nieuwe kaart</button>
 </div>
 <div class="bingo-board">
  <div id="teamOverlay" class="team-overlay"></div>
  <div class="grid" id="grid"></div>
  <div id="bingoLineLayer" class="bingo-line-layer"></div>
 </div>
</div>

<div id="saved" class="panel">
 <h2>Opgeslagen kaarten (Beheer)</h2>
 <div id="savedCards"></div>
</div>

<div id="previewModal" class="preview-modal" onclick="closePreview(event)">
 <div class="modal-content" onclick="event.stopPropagation()">
   <div class="bingo-board"><div id="previewTeamOverlay" class="team-overlay"></div><div id="previewGrid" class="grid"></div></div>
 </div>
</div>

<script>
const PASSWORD = "1337";
let editUnlocked = false;

function unlockEdit(){
 if(editUnlocked) return true;
 const p = prompt("Voer beheerderscode in:");
 if(p === PASSWORD){ editUnlocked = true; return true; }
 return false;
}

function showTab(id){
 document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 if(id === 'saved') loadSavedCards();
 if(id === 'public') loadPublicCards();
}

function updateTeamOverlay() {
 document.getElementById('teamOverlay').innerText = document.getElementById('teamName').value;
}

// Bingo Lijnen Logica
function getBingoLines(checked){
  const set = new Set(checked);
  const winLines = [
    { type:"row", index:0, cells:[0,1,2,3] }, { type:"row", index:1, cells:[4,5,6,7] },
    { type:"row", index:2, cells:[8,9,10,11] }, { type:"row", index:3, cells:[12,13,14,15] },
    { type:"col", index:0, cells:[0,4,8,12] }, { type:"col", index:1, cells:[1,5,9,13] },
    { type:"col", index:2, cells:[2,6,10,14] }, { type:"col", index:3, cells:[3,7,11,15] },
    { type:"diag", index:0, cells:[0,5,10,15] }, { type:"diag", index:1, cells:[3,6,9,12] }
  ];
  return winLines.filter(line => line.cells.every(i => set.has(i)));
}

function updateBingoLines(checked){
  const layer = document.getElementById("bingoLineLayer");
  layer.innerHTML = "";
  getBingoLines(checked).forEach(line => {
    const div = document.createElement("div");
    div.className = "bingo-line " + line.type;
    if(line.type === "row") div.style.top = (line.index * 25 + 6.5) + "%";
    if(line.type === "col") div.style.left = (line.index * 25 + 6.5) + "%";
    if(line.type === "diag") div.style.transform = line.index === 0 ? "translate(-50%,-50%) rotate(45deg)" : "translate(-50%,-50%) rotate(-45deg)";
    layer.appendChild(div);
  });
}

function buildEditorGrid() {
 const grid = document.getElementById('grid');
 grid.innerHTML = '';
 for(let i = 0; i < 16; i++){
  let c = document.createElement('div');
  c.className = 'cell';
  c.onclick = () => {
    if(!unlockEdit()) return;
    c.classList.toggle('checked');
    const checked = [];
    document.querySelectorAll('#grid .cell').forEach((el, idx) => { if(el.classList.contains('checked')) checked.push(idx); });
    updateBingoLines(checked);
  };
  grid.appendChild(c);
 }
}

function saveCard(){
 const team = document.getElementById('teamName').value.trim();
 if(!team) return alert('Voer een teamnaam in');
 const checked = [];
 document.querySelectorAll('#grid .cell').forEach((c,i) => { if(c.classList.contains('checked')) checked.push(i); });
 localStorage.setItem('bingo_' + team, JSON.stringify({team, checked}));
 alert('Kaart opgeslagen!');
}

// Initialisatie
document.addEventListener("DOMContentLoaded", () => {
 buildEditorGrid();
 loadPublicCards();
});
</script>
</body>
</html>
